name: Deploy Server to Render

on:
  push:
    branches: [main]
    paths:
      - "server/**"
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: server

  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production

    steps:
      # Render construye el Docker image directamente desde el repo.
      # El deploy hook URL se obtiene en: Render Dashboard → Service → Settings → Deploy Hook
      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
