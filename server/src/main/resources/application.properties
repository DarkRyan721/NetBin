spring.application.name=NetBin
spring.jpa.hibernate.ddl-auto=update
server.port=${PORT:8080}
# SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
# Configuraci�n de la base de datos

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desarrollo: coma-separado, sin slash final.
# Produccion (Render): setear CORS_ALLOWED_ORIGINS con dominios exactos o patrones (ej: https://netbin-*.vercel.app)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://netbin.vercel.app}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
